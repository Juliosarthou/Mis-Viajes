workflows:
  android-shorebird:
    name: Android Shorebird Release
    instance_type: mac_mini_m1
    environment:
      groups:
        - shorebird_credentials # SHOREBIRD_TOKEN
        - keystore_credentials # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      flutter: stable
    scripts:
      - name: Install Shorebird
        script: |
          curl -proto '=https' -tlsv1.2 -sSf https://install.shorebird.dev | bash
          export PATH="$HOME/.shorebird/bin:$PATH"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Shorebird Release Android
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird release android -- --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab

  ios-shorebird:
    name: iOS Shorebird Release
    instance_type: mac_mini_m1
    environment:
      groups:
        - shorebird_credentials # SHOREBIRD_TOKEN
        - apple_credentials # Certificados de Apple
      flutter: stable
      xcode: latest
    scripts:
      - name: Install Shorebird
        script: |
          curl -proto '=https' -tlsv1.2 -sSf https://install.shorebird.dev | bash
          export PATH="$HOME/.shorebird/bin:$PATH"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Shorebird Release iOS
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird release ios -- --release
    artifacts:
      - build/ios/ipa/*.ipa
